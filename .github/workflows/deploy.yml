name: Déploiement GitHub Pages

# Publie le jeu (site statique) sur GitHub Pages à chaque push.
# Active d'abord Pages : Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches:
      - main
      - claude/idle-mmorpg-vision-hivkpu
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (exclut .git / .github)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement Pages (source = GitHub Actions) si ce n'est pas déjà fait.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
