<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" shape-rendering="crispEdges" width="64" height="80">
  <!-- Bandit encapuchonné, face à droite. -->
  <!-- Jambes / bottes -->
  <rect x="12" y="29" width="4" height="7" fill="#2a2c36"/>
  <rect x="17" y="29" width="4" height="7" fill="#23252e"/>
  <rect x="11" y="35" width="6" height="4" fill="#16171d"/>
  <rect x="17" y="35" width="6" height="4" fill="#101117"/>
  <!-- Cape / torse -->
  <rect x="9" y="14" width="15" height="16" fill="#3c3f4d"/>
  <rect x="9" y="14" width="4" height="16" fill="#2a2c36"/>
  <rect x="11" y="16" width="9" height="10" fill="#454957"/>
  <!-- Bras avant + dague -->
  <rect x="21" y="18" width="3" height="7" fill="#2a2c36"/>
  <rect x="22" y="22" width="3" height="3" fill="#caa86f"/>
  <rect x="24" y="15" width="2" height="8" fill="#e6ebf3"/>
  <rect x="23" y="22" width="4" height="2" fill="#8a6d2f"/>
  <!-- Capuche -->
  <rect x="12" y="5" width="10" height="11" fill="#3c3f4d"/>
  <rect x="12" y="5" width="10" height="2" fill="#454957"/>
  <polygon points="22,7 26,9 22,12" fill="#3c3f4d"/>
  <!-- Visage dans l'ombre -->
  <rect x="15" y="9" width="7" height="6" fill="#0c0d12"/>
  <!-- Yeux luisants -->
  <rect x="19" y="11" width="2" height="2" fill="#9fe3ff"/>
  <rect x="16" y="11" width="2" height="2" fill="#9fe3ff"/>
</svg>
